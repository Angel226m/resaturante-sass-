# ==========================================
# RestauFlow SaaS — Docker Compose LOCAL
# Sin nginx externo, puertos expuestos para desarrollo
# ==========================================

name: restauflow-local

services:
  db:
    image: postgres:17-alpine
    container_name: restauflow-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: restauflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d restauflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - local-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  redis:
    image: redis:7-alpine
    container_name: restauflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - local-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: restauflow-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ENV: development
      GIN_MODE: debug
      SERVER_PORT: "8080"
      SERVER_HOST: "0.0.0.0"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: restauflow
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSL_MODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      CORS_ORIGIN: "http://localhost:3000"
      JWT_SECRET: "b0493d967380362288432419f426f08c7c3e6255b9dc28c506d05c712a6e1e87"
      JWT_REFRESH_SECRET: "01153c958b239751ae0f17d9aa7ccbf0b5257d6cc70ea1f4bda64caa94f73b4e"
      ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef"
      ENABLE_WEBSOCKETS: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - local-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: restauflow-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    tmpfs:
      - /tmp
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - local-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

volumes:
  postgres_data:
  redis_data:

networks:
  local-net:
    driver: bridge
